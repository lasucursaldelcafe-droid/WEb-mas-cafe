name: Publicar HTML en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Generar sitio multipágina
        run: node scripts/build-github-pages.mjs

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-site

      - name: Publicar en línea
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verificar sitio
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "URL publicada: $URL"
          for path in "" "cafe/" "menu/" "tienda/"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}${path}")
            echo "${URL}${path} → HTTP $CODE"
          done
