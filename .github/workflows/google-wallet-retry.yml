name: Reintentar Google Wallet

# Reintenta provisión cuando exista JSON válido o FIREBASE_TOKEN renovado.
# Cron diario + manual desde Actions.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-wallet-retry
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Diagnóstico y provisión
        continue-on-error: true
        id: heal
        env:
          GOOGLE_PAY_MERCHANT_ID: BCR2DN5TR7J4FLAR
          GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"
          GOOGLE_WALLET_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GITHUB_SECRETS: "0"
        run: node scripts/heal-google-wallet.mjs

      - name: Verificar configured (no estricto)
        if: steps.heal.outcome == 'success'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          STATUS=$(curl -sS "$SUPABASE_URL/functions/v1/wallet" \
            -H "Content-Type: application/json" \
            -d '{"action":"getGoogleWalletStatus"}')
          echo "$STATUS"
          echo "$STATUS" | grep -q '"configured":true' || exit 1

      - name: Resumen si sigue pendiente
        if: failure()
        run: |
          echo "::warning::Google Wallet sigue con configured=false."
          echo "Ingesta el JSON GCP: Actions → Ingestar JSON Google Wallet"
          echo "O renueva FIREBASE_TOKEN con: npx firebase login:ci"
