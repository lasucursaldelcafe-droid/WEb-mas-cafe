name: Setup Google Wallet

# Usa la cuenta de servicio Google Cloud (secret FIREBASE_SERVICE_ACCOUNT = JSON GCP).
# Backend wallet: Supabase. Clase loyalty ya creada en Pay Console.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/google-wallet.json"
      - "scripts/automate-google-wallet.mjs"
      - "scripts/lib/google-wallet-api.mjs"
      - ".github/workflows/setup-google-wallet.yml"

permissions:
  contents: read

concurrency:
  group: setup-google-wallet
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Automatizar Google Wallet
        env:
          GOOGLE_PAY_MERCHANT_ID: BCR2DN5TR7J4FLAR
          GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_WALLET_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          if [ -z "$GOOGLE_WALLET_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Falta JSON de cuenta de servicio Google Cloud en GitHub Secrets"
            exit 1
          fi
          export GITHUB_TOKEN="${GITHUB_TOKEN:-$GH_PAGES_PAT}"
          node scripts/automate-google-wallet.mjs

      - name: Republicar GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_PAGES_PAT }}
        run: |
          gh workflow run "Publicar HTML en GitHub Pages" --repo lasucursaldelcafe-droid/WEb-mas-cafe || true
