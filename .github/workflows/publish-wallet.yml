name: Publicar wallet

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/publish-wallet.mjs"
      - "scripts/wallet/**"
      - "supabase/functions/wallet/**"
      - "content/wallet-program.json"
      - "content/google-wallet.json"
      - ".github/workflows/publish-wallet.yml"

permissions:
  contents: read

concurrency:
  group: publish-wallet
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Publicar wallet (Supabase + build + pruebas)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          SKIP_GITHUB_SECRETS: "1"
        run: node scripts/publish-wallet.mjs

      - name: Disparar GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_PAT }}
        run: |
          gh workflow run "Publicar HTML en GitHub Pages" --repo lasucursaldelcafe-droid/WEb-mas-cafe

      - name: Pruebas en vivo (tras Pages)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sleep 90
          node scripts/test-wallet-live.mjs || true
