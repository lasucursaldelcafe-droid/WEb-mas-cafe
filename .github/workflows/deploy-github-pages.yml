name: Publicar HTML en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Sincronizar Google Search Console (DNS → settings)
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
        run: node scripts/sync-google-seo.mjs --no-ping || true

      - name: Generar sitio multipágina
        env:
          ADMIN_PUBLISH_KEY: ${{ secrets.ADMIN_PUBLISH_KEY }}
        run: node scripts/build-github-pages.mjs

      - name: Verificar enlaces internos
        run: |
          npm run verify:links
          npm run verify:seo

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-site

      - name: Publicar en línea
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-publicación (HTTPS + sitemap Google)
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: node scripts/post-publish.mjs || true

      - name: Verificar sitio
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "URL publicada: $URL"
          FAILED=0
          for path in "" "cafe/" "menu/" "nosotros/" "tienda/" "blog/" "contacto/" "admin/" "informe/" "informe/wallet/"; do
            CODE=$(curl -sL -o /dev/null -w "%{http_code}" "${URL}${path}")
            echo "${URL}${path} → HTTP $CODE"
            if [ "$CODE" != "200" ]; then FAILED=1; fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "❌ Alguna ruta no respondió HTTP 200"
            exit 1
          fi
          echo "✅ Todas las rutas verificadas"
