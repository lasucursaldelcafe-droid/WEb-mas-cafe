name: Publicar en Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FIREBASE_PROJECT: mas-cafe-c8413

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Solo necesario si usas Workload Identity Federation (ver docs/HOSTING.md)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar sitio HTML
        run: node scripts/build-mas-cafe.mjs

      - name: Autenticar con Workload Identity (opcional)
        id: wif-auth
        if: vars.WIF_PROVIDER != '' && vars.WIF_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Verificar credenciales Firebase
        id: firebase-auth
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${{ steps.wif-auth.outputs.credentials_file_path }}" ]; then
            echo "mode=wif" >> "$GITHUB_OUTPUT"
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "mode=service_account" >> "$GITHUB_OUTPUT"
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_TOKEN" ]; then
            if npx -y firebase-tools@latest projects:list \
              --token "$FIREBASE_TOKEN" \
              --non-interactive >/dev/null 2>&1; then
              echo "mode=token" >> "$GITHUB_OUTPUT"
              echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "mode=token_invalid" >> "$GITHUB_OUTPUT"
              echo "can_deploy=false" >> "$GITHUB_OUTPUT"
              echo "::warning::FIREBASE_TOKEN inválido o expirado. El sitio principal en GitHub Pages no se ve afectado."
              echo "Renueva el token con: npx firebase login:ci"
              echo "Luego actualiza el secret FIREBASE_TOKEN en GitHub."
            fi
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Sin credenciales Firebase. Deploy omitido (GitHub Pages es el canal principal)."
          fi

      - name: Deploy Firebase Hosting
        if: steps.firebase-auth.outputs.can_deploy == 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.wif-auth.outputs.credentials_file_path }}
        run: |
          AUTH_MODE=""
          if [ "${{ steps.firebase-auth.outputs.mode }}" = "wif" ]; then
            AUTH_MODE="Workload Identity Federation"
          elif [ "${{ steps.firebase-auth.outputs.mode }}" = "service_account" ]; then
            AUTH_MODE="cuenta de servicio (JSON)"
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          else
            AUTH_MODE="token CI (firebase login:ci)"
          fi

          echo "Autenticación: $AUTH_MODE"
          npx -y firebase-tools@latest deploy \
            --only hosting:mas-cafe-c8413 \
            --project mas-cafe-c8413 \
            --non-interactive

          rm -f /tmp/firebase-sa.json

      - name: Verificar sitio en vivo
        if: steps.firebase-auth.outputs.can_deploy == 'true'
        run: |
          for URL in https://mas-cafe-c8413.web.app/ https://mas-cafe-c8413.firebaseapp.com/; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "$URL → HTTP $CODE"
          done
