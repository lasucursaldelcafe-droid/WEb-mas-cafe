name: Setup Google Wallet

# Fase 1: Issuer ID + Edge Function (siempre).
# Fase 2: Si hay JSON GCP válido en secrets → JWT activo + prueba.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/google-wallet.json"
      - "scripts/**/google-wallet*.mjs"
      - "scripts/prepare-google-console.mjs"
      - "scripts/provision-google-wallet-sa.mjs"
      - "scripts/lib/read-google-sa.mjs"
      - ".github/workflows/setup-google-wallet.yml"

permissions:
  contents: read

concurrency:
  group: setup-google-wallet
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Preparar consola + Supabase (Issuer ID)
        env:
          GOOGLE_PAY_MERCHANT_ID: BCR2DN5TR7J4FLAR
          GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SKIP_GITHUB_SECRETS: "1"
        run: node scripts/prepare-google-console.mjs

      - name: Provisionar JSON (reparar secret o crear clave IAM)
        id: provision
        continue-on-error: true
        env:
          GOOGLE_PAY_MERCHANT_ID: BCR2DN5TR7J4FLAR
          GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"
          GOOGLE_WALLET_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GITHUB_SECRETS: "0"
        run: node scripts/provision-google-wallet-sa.mjs

      - name: Resumen si provisión falló
        if: steps.provision.outcome == 'failure'
        run: |
          echo "::warning::Provisión SA falló — Issuer ID ya desplegado; falta JSON GCP o FIREBASE_TOKEN válido."
          echo "→ Actions → Ingestar JSON Google Wallet (pegar JSON completo)"
          echo "→ O renovar FIREBASE_TOKEN: npx firebase login:ci"

      - name: Republicar GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Publicar HTML en GitHub Pages" --repo lasucursaldelcafe-droid/WEb-mas-cafe || true
