name: Publicar en Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FIREBASE_PROJECT: mas-cafe-c8413

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Solo necesario si usas Workload Identity Federation (ver docs/HOSTING.md)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar sitio HTML
        run: node scripts/build-mas-cafe.mjs

      - name: Autenticar con Workload Identity (opcional)
        id: wif-auth
        if: vars.WIF_PROVIDER != '' && vars.WIF_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.wif-auth.outputs.credentials_file_path }}
        run: |
          AUTH_MODE=""

          if [ -n "${{ steps.wif-auth.outputs.credentials_file_path }}" ]; then
            AUTH_MODE="Workload Identity Federation"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            AUTH_MODE="cuenta de servicio (JSON)"
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          elif [ -n "$FIREBASE_TOKEN" ]; then
            AUTH_MODE="token CI (firebase login:ci)"
          else
            echo "::error::No hay credenciales para deploy."
            echo ""
            echo "Si tu organización BLOQUEA claves JSON de cuenta de servicio, usa una de estas opciones:"
            echo "  A) Deploy local: npm run deploy:firebase (tras npx firebase login)"
            echo "  B) GitHub Secret FIREBASE_TOKEN: ejecuta 'npx firebase login:ci' en tu PC"
            echo "  C) Workload Identity Federation: ver docs/HOSTING.md"
            exit 1
          fi

          echo "Autenticación: $AUTH_MODE"
          npx -y firebase-tools@latest deploy \
            --only hosting:mas-cafe-c8413 \
            --project mas-cafe-c8413 \
            --non-interactive

          rm -f /tmp/firebase-sa.json

      - name: Verificar sitio en vivo
        run: |
          for URL in https://mas-cafe-c8413.web.app/ https://mas-cafe-c8413.firebaseapp.com/; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "$URL → HTTP $CODE"
          done
