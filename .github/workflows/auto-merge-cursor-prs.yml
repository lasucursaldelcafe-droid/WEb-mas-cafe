name: Auto-merge PRs cursor/*

# Valida y fusiona automáticamente PRs de ramas cursor/* hacia main.
# El deploy a mascafé.com ocurre en deploy-github-pages.yml tras el merge.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número de PR a fusionar (vacío = detectar por rama)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  validate-and-merge:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.state == 'open' &&
       github.event.pull_request.head.ref != '' &&
       startsWith(github.event.pull_request.head.ref, 'cursor/'))
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código del PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validar build y SEO
        if: steps.pr.outputs.should_run == 'true'
        env:
          ADMIN_PUBLISH_KEY: ${{ secrets.ADMIN_PUBLISH_KEY }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          CI_SKIP_INFORME_SOURCE: "1"
        run: |
          npm ci
          npm run ci:validate

      - name: Fusionar PR automáticamente
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi

          if [ -z "$PR" ]; then
            echo "No hay número de PR"
            exit 1
          fi

          STATE=$(gh pr view "$PR" --json state --jq .state)
          if [ "$STATE" = "MERGED" ]; then
            echo "✅ PR #$PR ya fusionado"
            exit 0
          fi
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR no está abierto ($STATE) — omitiendo"
            exit 0
          fi

          echo "Fusionando PR #$PR"
          gh pr ready "$PR" 2>/dev/null || true
          gh pr merge "$PR" --squash --delete-branch --subject "$(gh pr view "$PR" --json title --jq .title)"

      - name: Resumen
        if: success() && steps.pr.outputs.should_run == 'true'
        run: |
          echo "✅ PR fusionado. El workflow «Publicar HTML en GitHub Pages» desplegará el sitio."

      - name: Omitido (PR ya cerrado)
        if: steps.pr.outputs.should_run != 'true'
        run: echo "✅ Sin acción — el PR ya fue fusionado o cerrado."
