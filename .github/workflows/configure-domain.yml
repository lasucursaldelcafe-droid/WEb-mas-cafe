name: Configurar dominio mascafé.com

# Solo manual (workflow_dispatch). Los fallos «push» históricos fueron por YAML inválido ya corregido.
# Para automatización completa usa: Setup autónomo (build + dominio)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular sin aplicar cambios"
        type: boolean
        default: false
      skip_godaddy:
        description: "Omitir GoDaddy DNS"
        type: boolean
        default: false
      skip_github:
        description: "Omitir GitHub Pages custom domain"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar credenciales
        if: inputs.skip_godaddy != true && inputs.dry_run != true
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: node scripts/validate-credentials.mjs

      - name: Optimizar GoDaddy (DNS + diagnóstico)
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/godaddy-optimize.mjs $ARGS || true

      - name: Configurar dominio
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.skip_godaddy }}" = "true" ]; then ARGS="$ARGS --skip-godaddy"; fi
          if [ "${{ inputs.skip_github }}" = "true" ]; then ARGS="$ARGS --skip-github"; fi
          node scripts/configure-domain.mjs $ARGS

      - name: Activar HTTPS (si DNS válido)
        if: inputs.dry_run != true && inputs.skip_github != true
        env:
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_PAT || github.token }}
        run: node scripts/enable-https.mjs || true

      - name: Verificar dominio
        if: inputs.dry_run != true
        run: node scripts/verify-domain.mjs || true
