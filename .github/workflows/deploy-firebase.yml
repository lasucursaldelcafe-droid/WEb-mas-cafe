name: Publicar en Firebase (como La Sucursal)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FIREBASE_PROJECT: la-sucursal-del-cafe

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar sitio HTML
        run: node scripts/build-mas-cafe.mjs

      - name: Crear sitio Firebase (si no existe)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Falta el secret FIREBASE_SERVICE_ACCOUNT en GitHub."
            echo "Cópialo del repo feria-cafe-inscripcion (mismo Firebase)."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx -y firebase-tools@latest hosting:sites:create mas-cafe \
            --project la-sucursal-del-cafe --non-interactive 2>/dev/null || true
          rm -f /tmp/firebase-sa.json

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx -y firebase-tools@latest deploy \
            --only hosting \
            --project la-sucursal-del-cafe \
            --non-interactive
          rm -f /tmp/firebase-sa.json

      - name: Verificar sitio en vivo
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://mas-cafe.web.app/)
          echo "mas-cafe.web.app → HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::El sitio aún no responde 200 (propagación DNS)."
          fi
