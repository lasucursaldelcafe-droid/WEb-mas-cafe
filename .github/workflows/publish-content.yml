name: Publicar contenido desde admin

on:
  repository_dispatch:
    types: [publish-site-content]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validar solicitud
        env:
          EXPECTED: ${{ secrets.ADMIN_PUBLISH_KEY }}
          RECEIVED: ${{ github.event.client_payload.key }}
        run: |
          if [ -z "$EXPECTED" ]; then
            echo "::error::Falta el secret ADMIN_PUBLISH_KEY en el repositorio."
            exit 1
          fi
          if [ "$EXPECTED" != "$RECEIVED" ]; then
            echo "::error::Clave de publicación inválida."
            exit 1
          fi

      - name: Obtener código
        uses: actions/checkout@v4

      - name: Guardar imágenes nuevas
        env:
          IMAGES_JSON: ${{ toJSON(github.event.client_payload.images) }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const images = JSON.parse(process.env.IMAGES_JSON || '[]');
          for (const img of images) {
            const dest = img.path.replace(/^\//, '');
            fs.mkdirSync(path.dirname(dest), { recursive: true });
            fs.writeFileSync(dest, Buffer.from(img.content, 'base64'));
            console.log('✓', dest);
          }
          "

      - name: Actualizar site.json
        env:
          CONTENT_B64: ${{ github.event.client_payload.content }}
        run: |
          echo "$CONTENT_B64" | base64 -d > content/site.json
          python3 -m json.tool content/site.json > /dev/null

      - name: Commit y push
        run: |
          git config user.name "Más Café Admin"
          git config user.email "admin@mascafecol.com"
          git add content/site.json public/images/
          if git diff --staged --quiet; then
            echo "Sin cambios"
            exit 0
          fi
          git commit -m "admin: actualizar contenido del sitio"
          git push
