name: Publicar HTML en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Generar sitio (HTML + imágenes incluidas)
        run: node scripts/build-github-pages.mjs

      - name: Publicar en rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-site
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: sitio Más Café (HTML + imágenes)"

      - name: Verificar URL
        run: |
          URL="https://lasucursaldelcafe-droid.github.io/WEb-mas-cafe/"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
          echo "$URL → HTTP $CODE"
          if [ "$CODE" = "404" ]; then
            echo "::warning::Si ves 404, activa GitHub Pages: Settings → Pages → gh-pages → / (root)"
          fi
