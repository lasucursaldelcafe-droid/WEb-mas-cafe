name: Deploy wallet Supabase

# Backend wallet en plan gratuito (Auth + Postgres + Edge Functions).
# No requiere facturación Blaze como Firebase Cloud Functions.
#
# Secrets:
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "content/wallet-program.json"
      - "scripts/setup-supabase-wallet.mjs"
      - "scripts/setup-google-wallet.mjs"
      - "scripts/lib/google-wallet-api.mjs"
      - "scripts/wallet/**"
      - ".github/workflows/deploy-supabase-wallet.yml"

permissions:
  contents: read

concurrency:
  group: deploy-supabase-wallet
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy wallet Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_WALLET_ISSUER_ID: ${{ secrets.GOOGLE_WALLET_ISSUER_ID }}
          GOOGLE_WALLET_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_WALLET_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::Configura SUPABASE_ACCESS_TOKEN y SUPABASE_PROJECT_REF para deploy automático."
            echo "Guía: proyecto-mas-cafe/cuentas/ENLACES-CONFIGURACION.md"
            exit 0
          fi
          if [ -n "$GOOGLE_WALLET_ISSUER_ID" ] && [ -n "$GOOGLE_WALLET_SERVICE_ACCOUNT" ]; then
            npx supabase secrets set \
              GOOGLE_WALLET_ISSUER_ID="$GOOGLE_WALLET_ISSUER_ID" \
              GOOGLE_WALLET_SERVICE_ACCOUNT="$GOOGLE_WALLET_SERVICE_ACCOUNT" \
              --project-ref "$SUPABASE_PROJECT_REF"
          fi
          node scripts/setup-supabase-wallet.mjs
