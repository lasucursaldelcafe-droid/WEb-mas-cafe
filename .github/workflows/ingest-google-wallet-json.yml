name: Ingestar JSON Google Wallet

# Pega el JSON descargado de GCP (cuenta de servicio) al ejecutar manualmente.
# Actions → Ingestar JSON Google Wallet → Run workflow → pegar JSON completo.

on:
  workflow_dispatch:
    inputs:
      service_account_json:
        description: "JSON completo de la cuenta de servicio GCP (firebase-adminsdk-…)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Validar e importar JSON
        env:
          GOOGLE_PAY_MERCHANT_ID: BCR2DN5TR7J4FLAR
          GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GITHUB_SECRETS: "0"
          SA_JSON: ${{ inputs.service_account_json }}
        run: |
          set -euo pipefail
          printf '%s' "$SA_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          node scripts/validate-google-service-account.mjs
          node scripts/wallet-google-ingest.mjs /tmp/gcp-sa.json
          rm -f /tmp/gcp-sa.json
