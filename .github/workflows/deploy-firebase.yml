name: Publicar en Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FIREBASE_PROJECT: mas-cafe-c8413

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generar sitio HTML
        run: node scripts/build-mas-cafe.mjs

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Falta FIREBASE_SERVICE_ACCOUNT en GitHub Secrets."
            echo "Firebase Console → mas-cafe-c8413 → Configuración → Cuentas de servicio → Generar clave"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx -y firebase-tools@latest deploy \
            --only hosting \
            --project mas-cafe-c8413 \
            --non-interactive
          rm -f /tmp/firebase-sa.json

      - name: Verificar sitio en vivo
        run: |
          for URL in https://mas-cafe-c8413.web.app/ https://mas-cafe-c8413.firebaseapp.com/; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "$URL → HTTP $CODE"
          done
